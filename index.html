  <style>
    body { margin: 0; padding: 0; }
    /* iPad PWA: respect safe areas (notch / home indicator) */
    @supports (padding: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        background: #161040;
      }
    }
    /* Prevent overscroll bounce on iPad Safari */
    html, body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    /* Block pinch-zoom on iPad Safari (iOS 26 ignores user-scalable=no) */
    html, body { touch-action: pan-x pan-y; }
    /* FIX 3137 (capa 1): matar el font-boosting de iOS — el autosizing re-infla
       el texto al cambiar la escala del viewport (pinch), y con texto VERTICAL
       ese inflado se convierte en demanda de ALTURA de la celda rotada. */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    /* Sustituir el tinte azul claro de las filas de la tabla por gris claro.
       El bundle de la app usa Tailwind: blue-50/100 para fondos pares/impares. */
    table tr td.bg-blue-50,
    table tr td.bg-blue-100,
    table tr td[class*="bg-blue-50"],
    table tr td[class*="bg-blue-100"] {
      background-color: #f3f4f6 !important; /* gray-100 */
    }

    /* v1.6 — Texto rojo de avería POR CELDA, agrupado por turno.
       Reemplaza al selector v1.5 a nivel <tr>, que en ESTADO COMPLETO teñía los
       3 turnos aunque solo uno estuviera averiado (bug del 3078 en TARDE). Ahora
       tintarTextosAveriado() marca cada <td> averiado de su turno con
       data-cnt-averiado-cell="1"; los numcells (data-cnt-numcell) nunca reciben
       la marca, así que su número va en blanco sobre su propio fondo rojo. El
       color lo controla este CSS según el atributo, que la función pone/quita en
       cada pasada → 100% reversible, sin rojos pegados. */
    td[data-cnt-averiado-cell="1"]:not([data-cnt-numcell="1"]),
    td[data-cnt-averiado-cell="1"]:not([data-cnt-numcell="1"]) * {
      color: #dc2626 !important;
    }
    table tr td[style*="background-color: rgb(239, 246, 255)"],
    table tr td[style*="background-color: rgb(219, 234, 254)"],
    table tr td[style*="background: rgb(239, 246, 255)"],
    table tr td[style*="background: rgb(219, 234, 254)"] {
      background-color: #f3f4f6 !important;
    }
    table tr.bg-blue-50,
    table tr.bg-blue-100,
    table tr[class*="bg-blue-50"],
    table tr[class*="bg-blue-100"] {
      background-color: #f3f4f6 !important;
    }

    /* Letra "A" del botón naranja "copiar averiados" — pseudo-elemento para que
       el texto NO contamine th.textContent (rompía la detección NOCHE/URB/TARDE
       de injectContadores e injectEstadoLocks). */
    [data-copyav-btn]::after {
      content: 'A';
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    /* Force every table row to have a fixed height regardless of content/zoom.
       The yellow gap on row 3137 happens because the app gives that row
       height:auto and the flex container lets it stretch to fill space. */
    table tr[data-uniform-row="1"] {
      height: 40px !important;
      max-height: 40px !important;
      min-height: 40px !important;
    }
    table tr[data-uniform-row="1"] > td,
    table tr[data-uniform-row="1"] > th {
      height: 40px !important;
      max-height: 40px !important;
      min-height: 40px !important;
      overflow: hidden !important;
      vertical-align: middle !important;
      box-sizing: border-box !important;
    }
    /* If the table is wrapped in a flex container that stretches it, neutralise it */
    table[data-flat-table="1"] {
      height: auto !important;
      flex: 0 0 auto !important;
    }
    table[data-flat-table="1"] tbody {
      height: auto !important;
    }

    /* ═══ FIX 3137/3085 (iOS WebKit) — etiquetas de grupo rotadas ═══
       CAUSA RAÍZ (investigada a fondo, 16-jul-2026): las etiquetas "CARGAS
       LATERALES"/"TRASERAS" son <td rowspan=N> con writing-mode:vertical-lr
       INLINE y SIN altura fijada: su altura es la INTRÍNSECA del texto
       vertical. El pinch del bundle aplica CSS *zoom* fraccionario (re-maqueta
       la tabla en cada frame) y el text-autosizing de iOS puede inflar ese
       texto → la celda exige más altura que la suma de sus N filas → el
       algoritmo de tablas descarga TODO el exceso en la ÚLTIMA fila del
       rowspan: la 3137 (último vehículo de CARGAS LATERALES; 3085 es el
       primero de TRASERAS). height/max-height en tr/td NO pueden limitarlo
       (height en tabla es un MÍNIMO y max-height directamente se ignora —
       por eso fallaron los 6 intentos del 18-05-2026).
       FIX: la celda deja de aportar altura intrínseca — el texto real pasa a
       font-size:0 en flujo horizontal (sigue en el DOM: React y las
       detecciones por textContent no se enteran) y la etiqueta VISIBLE se
       pinta con un ::after en position:absolute (out-of-flow = CERO altura
       intrínseca por definición), centrada en el alto del grupo, con
       overflow:hidden (si algún día no cupiera, RECORTA — jamás estira).
       El rotate(180deg) inline del td sigue activo: voltea también al
       ::after → mismo aspecto exacto que el original. */
    /* ⚠️ v2 del fix (17-jul-2026): la 1ª versión usaba ::after en
       position:absolute con inset 0 — en WebKit iOS el pseudo ABSOLUTO dentro
       de una celda alimenta el cálculo de ANCHO de columna (bug distinto: la
       columna de etiqueta se hinchaba a ~660px y aplastaba los datos, "tabla
       en blanco" en iPhone). Verificado en WebKit real (Playwright): el diseño
       estable es el ::after EN FLUJO con height:0 + width EXPLÍCITO — aporta
       0 altura, no dispara el auto-width ortogonal, y el texto desborda
       simétricamente desde el centro (flex align-items:center sobre caja de
       0px + vertical-align:middle del td) → etiqueta centrada como siempre. */
    td[data-av-rot="1"] {
      writing-mode: horizontal-tb !important;
      -webkit-writing-mode: horizontal-tb !important;
      font-size: 0 !important;
      line-height: 0 !important;
      color: transparent !important;
      padding: 0 !important;
      overflow: visible;
    }
    td[data-av-rot="1"]::after {
      content: attr(data-av-label);
      display: flex;              /* EN FLUJO (nunca absolute: bug de anchura WebKit) */
      height: 0;                  /* aporta 0 altura intrínseca SIEMPRE */
      width: 20px;                /* EXPLÍCITO (width:auto/100% en flujo ortogonal → columna de 660px) */
      overflow: visible;          /* el texto se pinta desbordando la caja de 0px */
      align-items: center;        /* centra el texto sobre la línea de 0px (mitad arriba, mitad abajo) */
      justify-content: center;
      writing-mode: vertical-lr;
      -webkit-writing-mode: vertical-lr;
      font-size: 9px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #374151; /* text-gray-700 = el color original de la etiqueta */
      white-space: nowrap;
      pointer-events: none;
    }
    /* La celda de etiqueta queda FUERA del clamp de uniform-row (su
       overflow:hidden recortaría la etiqueta, que vive desbordando una caja
       de 0px). Especificidad mayor que la regla genérica → gana. */
    table tr[data-uniform-row="1"] > td[data-av-rot="1"] {
      overflow: visible !important;
      height: auto !important;
      max-height: none !important;
      min-height: 0 !important;
    }
    /* Hijos reales dentro de la celda (p. ej. el "+" del modo edición):
       rescatarlos del font-size:0 heredado. */
    td[data-av-rot="1"] > * { font-size: 13px; line-height: normal; }

    /* Password gate (loads before the app) */
    #__gate__ {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #161040 0%, #0d1035 45%, #07080f 100%);
      z-index: 2147483647;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #__gate__ .card {
      background: rgba(255,255,255,0.05);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      width: 86%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    #__gate__ h1 {
      color: #fff; font-size: 16px; font-weight: 700;
      margin: 0 0 24px; text-align: center; letter-spacing: 2px;
    }
    #__gate__ input {
      width: 100%; box-sizing: border-box;
      padding: 14px 16px; font-size: 17px;
      background: rgba(255,255,255,0.08);
      color: #fff; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; outline: none;
      -webkit-appearance: none; appearance: none;
      letter-spacing: 4px; text-align: center;
    }
    #__gate__ input::placeholder { letter-spacing: normal; color: rgba(255,255,255,0.4); }
    #__gate__ input:focus { border-color: #5eadff; background: rgba(255,255,255,0.12); }
    #__gate__ button {
      width: 100%; margin-top: 14px; padding: 14px;
      background: #3b82f6; color: #fff; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #__gate__ button:disabled { opacity: 0.5; }
    #__gate__ .err { color: #ff6b6b; font-size: 14px; text-align: center; min-height: 20px; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Password gate -->
  <div id="__gate__">
    <div class="card">
      <h1>AVISOR DE PARTES</h1>
      <input type="password" id="__gate_pwd__" placeholder="Contraseña" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <button id="__gate_ok__">Entrar</button>
      <div class="err" id="__gate_err__"></div>
    </div>
  </div>

  <script>
    (function () {
      var HASH = '8a09fbac5bb13bf413f26b00ce426e59a8aeab7aa9e593dc31a58a958cc23fbc';
      var SALT = 'avisor-partes-2026-iPad';
      var ITERATIONS = 250000;
      var STORAGE_KEY = '__avisor_auth_v2__';
      var LOCK_KEY = '__avisor_lock_v1__';

      // Rate-limit de intentos fallidos:
      //   1-4 fallos: sin bloqueo
      //   5  fallos: 5 minutos
      //   6-9       : 5 minutos
      //   10-19     : 1 hora
      //   20+       : 24 horas
      // Persiste en localStorage. Un atacante puede limpiarlo borrando
      // datos de Safari, pero eso es fricción suficiente para descartar
      // ataques automatizados casuales.
      function getLock() {
        try {
          var raw = localStorage.getItem(LOCK_KEY);
          if (!raw) return { attempts: 0, lockUntil: 0 };
          var obj = JSON.parse(raw);
          return { attempts: obj.attempts|0, lockUntil: obj.lockUntil|0 };
        } catch (e) { return { attempts: 0, lockUntil: 0 }; }
      }
      function saveLock(l) {
        try { localStorage.setItem(LOCK_KEY, JSON.stringify(l)); } catch (e) {}
      }
      function clearLock() {
        try { localStorage.removeItem(LOCK_KEY); } catch (e) {}
      }
      function lockDurationFor(attempts) {
        if (attempts < 5)  return 0;
        if (attempts < 10) return 5  * 60 * 1000;
        if (attempts < 20) return 60 * 60 * 1000;
        return 24 * 60 * 60 * 1000;
      }
      function fmtRemaining(ms) {
        var s = Math.ceil(ms / 1000);
        if (s < 60)    return s + ' s';
        var m = Math.ceil(s / 60);
        if (m < 60)    return m + ' min';
        var h = Math.ceil(m / 60);
        return h + ' h';
      }

      function pbkdf2Hex(pwd) {
        var enc = new TextEncoder();
        return crypto.subtle.importKey(
          'raw', enc.encode(pwd), { name: 'PBKDF2' }, false, ['deriveBits']
        ).then(function (key) {
          return crypto.subtle.deriveBits(
            { name: 'PBKDF2', salt: enc.encode(SALT), iterations: ITERATIONS, hash: 'SHA-256' },
            key, 256
          );
        }).then(function (bits) {
          var arr = new Uint8Array(bits);
          var hex = '';
          for (var i = 0; i < arr.length; i++) {
            hex += (arr[i] < 16 ? '0' : '') + arr[i].toString(16);
          }
          return hex;
        });
      }

      function loadApp() {
        var gate = document.getElementById('__gate__');
        if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
        var css = document.createElement('link');
        css.rel = 'stylesheet'; css.crossOrigin = ''; css.href = './assets/app.css';
        document.head.appendChild(css);
        var s = document.createElement('script');
        s.type = 'module'; s.crossOrigin = ''; s.src = './assets/app.js';
        document.head.appendChild(s);
      }

      // Already authenticated on this device?
      try {
        if (localStorage.getItem(STORAGE_KEY) === '1') {
          loadApp();
          return;
        }
      } catch (e) {}

      var input = document.getElementById('__gate_pwd__');
      var btn = document.getElementById('__gate_ok__');
      var err = document.getElementById('__gate_err__');
      var __lockTimer = null;

      function applyLockUI(remainingMs) {
        if (__lockTimer) { clearTimeout(__lockTimer); __lockTimer = null; }
        btn.disabled = true;
        input.disabled = true;
        input.value = '';
        err.textContent = 'Demasiados intentos. Espera ' + fmtRemaining(remainingMs) + '.';
        __lockTimer = setTimeout(function () {
          var lock = getLock();
          var rem = lock.lockUntil - Date.now();
          if (rem > 0) {
            applyLockUI(rem);
          } else {
            btn.disabled = false;
            input.disabled = false;
            err.textContent = '';
            try { input.focus(); } catch (e) {}
          }
        }, Math.min(remainingMs, 1000));
      }

      function tryAuth() {
        var lock = getLock();
        var now = Date.now();
        if (lock.lockUntil > now) {
          applyLockUI(lock.lockUntil - now);
          return;
        }
        btn.disabled = true;
        err.textContent = 'Comprobando...';
        pbkdf2Hex(input.value).then(function (hex) {
          if (hex === HASH) {
            clearLock();
            try { localStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
            loadApp();
          } else {
            // Fallo: incrementar contador y aplicar bloqueo si toca
            var l = getLock();
            l.attempts = (l.attempts|0) + 1;
            var dur = lockDurationFor(l.attempts);
            if (dur > 0) l.lockUntil = Date.now() + dur;
            saveLock(l);
            if (dur > 0) {
              applyLockUI(dur);
            } else {
              btn.disabled = false;
              err.textContent = 'Contraseña incorrecta';
              input.value = '';
              try { input.focus(); } catch (e) {}
            }
          }
        }).catch(function (e) {
          btn.disabled = false;
          err.textContent = 'Error: ' + (e && e.message ? e.message : 'desconocido');
        });
      }

      // Al cargar el gate, si ya hay bloqueo activo desde antes, aplicarlo
      (function checkInitialLock() {
        var lock = getLock();
        var rem = lock.lockUntil - Date.now();
        if (rem > 0) applyLockUI(rem);
      })();

      btn.addEventListener('click', tryAuth);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryAuth(); });
      // Focus after a tick so iOS shows the keyboard
      setTimeout(function () { try { if (!input.disabled) input.focus(); } catch (e) {} }, 100);
    })();
  </script>

  <script>
    (function () {
      function stripDiacritics(s) {
        return s.normalize ? s.normalize('NFD').replace(/[̀-ͯ]/g, '') : s;
      }

      // ═══════════════════════════════════════════════════════════════════════
      // "ÚLTIMA ACT." de SERVICIOS (NOCHE / URBANIZACIONES / TARDE individuales)
      //
      // Objetivo: cuando el usuario abre el candado de un servicio individual,
      // edita algo y lo cierra, sellar la fecha/hora en Firestore (campo NUEVO
      // 'ultimaActServicio') y mostrarla bajo el título. NO en ESTADO COMPLETO.
      //
      // - NO toca averías ni el campo 'timestamp' del bundle.
      // - Escribe con una app Firebase SECUNDARIA propia (compat SDK), nunca por
      //   fibers → la parte arriesgada (fibers) es solo LECTURA.
      // - Detección de cambios: foto de las celdas al abrir vs al cerrar.
      // - Compartido entre dispositivos (mismo doc Firestore que lee el bundle).
      // ═══════════════════════════════════════════════════════════════════════

      // ── RAMA ──────────────────────────────────────────────────────────────────
      // false = rama MÍA (v1.X): avisos + push + "ÚLTIMA ACT." en servicios.
      // true  = rama G (v1.XG, "para el resto de gente"): SIN avisos/push y SIN
      //         "ÚLTIMA ACT." en NOCHE/URB/TARDE (el de AVERÍAS es del bundle y
      //         se conserva). Todo lo demás (lápiz, añadir camiones, copia
      //         atómica, contadores...) idéntico en ambas ramas.
      // ⚠️ NO editar a mano: build-g.ps1 la pone a true al compilar la rama G.
      var __AV_RAMA_G = true;

      var __UA_CFG = {
        apiKey: "AIzaSyAOLHPUR4mNd4Tvo90uvTSGDNTfDb0Al64",
        authDomain: "partes-engargados.firebaseapp.com",
        projectId: "partes-engargados",
        storageBucket: "partes-engargados.firebasestorage.app",
        messagingSenderId: "607011501085",
        appId: "1:607011501085:web:03e6fa61f8bc31955682f4"
      };
      var __UA_APPID = "proyecto-avisor-partes"; // appId interno de la colección artifacts
      var __uaDb = null;          // firestore de NUESTRA app secundaria
      // Estado del WATCHER en tiempo real (sella la hora al modificar CUALQUIER celda,
      // lo haga quien lo haga, desde cualquier dispositivo). Sustituye al sellado por
      // candado/salir de versiones anteriores.
      var __uaWatching = false;   // ¿listener onSnapshot de SERVICIOS ya enganchado?
      var __uaUnsub = null;       // handle para desuscribir servicios
      var __uaBaseline = {};      // { docId: hash de registros visto por última vez }
      // --- Avisos de edición (v1.6.2, SOLO APK) ---
      var __uaWatchAver = false;  // ¿listener onSnapshot de AVERÍAS ya enganchado?
      var __uaUnsubAver = null;   // handle para desuscribir averías
      var __uaBaseAver = {};      // { docId: hash de avería visto por última vez }
      var __uaSelfEditUntil = 0;  // ventana tras editar YO: silenciar mi propio eco
      var __uaLastNotif = {};     // último aviso POR CLAVE (NOCHE/URB/TARDE/AVERIAS) — anti-spam
      var __UA_NOTIF_COOLDOWN = 600000; // 10 min en ms

      // Carga DIFERIDA de Firebase: el SDK NO está en el <head> (rompía el arranque
      // del APK: firebase-firestore-compat re-lanza un error al evaluarse junto al
      // bundle React → pantalla negra). Lo cargamos por JS SOLO cuando hace falta
      // sellar, ya con la app montada. app-compat PRIMERO, luego firestore-compat
      // (orden estricto). Guardado con promesa para no inyectar dos veces.
      var __uaFbLoading = null;
      var __uaFbReady = false;
      function __uaLoadScript(src) {
        return new Promise(function (resolve, reject) {
          var prev = document.querySelector('script[data-ua-fb="' + src + '"]');
          if (prev && prev.getAttribute('data-ua-loaded') === '1') { resolve(); return; }
          var s = document.createElement('script');
          s.src = src;
          s.async = false; // preservar orden de ejecución
          s.setAttribute('data-ua-fb', src);
          s.onload = function () { s.setAttribute('data-ua-loaded', '1'); resolve(); };
          s.onerror = function () { reject(new Error('No se pudo cargar ' + src)); };
          document.head.appendChild(s);
        });
      }
      function __uaEnsureFirebase() {
        if (__uaFbReady && typeof firebase !== 'undefined') return Promise.resolve();
        if (__uaFbLoading) return __uaFbLoading;
        __uaFbLoading = __uaLoadScript('./assets/firebase-app-compat.js')
          .then(function () { return __uaLoadScript('./assets/firebase-firestore-compat.js'); })
          .then(function () { __uaFbReady = true; })
          .catch(function (e) { __uaFbLoading = null; throw e; }); // permitir reintento
        return __uaFbLoading;
      }

      function __uaInitFirebase() {
        if (__uaDb) return __uaDb;
        try {
          if (typeof firebase === 'undefined' || !firebase.initializeApp) return null;
          var app;
          // Reutilizar nuestra app secundaria si ya existe (evita "app already exists")
          try { app = firebase.app('avisorUltimaAct'); }
          catch (e) { app = firebase.initializeApp(__UA_CFG, 'avisorUltimaAct'); }
          __uaDb = firebase.firestore(app);
          return __uaDb;
        } catch (e) { return null; }
      }

      // Normaliza una fecha "YYYY-MM-DD" o "DD-MM-YYYY" a "DD-MM-YYYY" (formato docId).
      function __uaFechaDocId(f) {
        if (!f) return null;
        var m = f.match(/^(\d{4})-(\d{2})-(\d{2})$/);      // YYYY-MM-DD
        if (m) return m[3] + '-' + m[2] + '-' + m[1];
        if (/^\d{2}-\d{2}-\d{4}$/.test(f)) return f;        // ya DD-MM-YYYY
        return null;
      }

      // Devuelve el doc {id,...} de servicios para un turno+fecha actuales, usando
      // el array en memoria (tiene el .id REAL). Si no está, compone el id estándar.
      function __uaDocInfoTurno(turno) {
        try {
          var servicios = __lkReadServicios();

        var mrCenterY = mr.top + mr.height / 2;

      //

      // ═══════════════════════════════════════════════════════════════════════
      // MOTOR DE ESCRITURA DIRECTA A FIRESTORE (una sola operación atómica).
      //
      // POR QUÉ (bug "0 fiable" de la copia de averiados en escritorio):
      //   El motor antiguo (abajo, __lkApplyByFiberBundle) llamaba al handler del
      //   bundle `onUpdateN(vid, campo, valor)` 4 veces por fila. Ese handler, si
      //   el documento del turno destino AÚN NO EXISTE, hace un setDoc que
      //   SOBREESCRIBE EL DOCUMENTO ENTERO (todos los vehículos en blanco menos el
      //   campo que escribe). Como las 4×N llamadas son async y se disparan casi a
      //   la vez, se PISAN entre ellas: gana el último setDoc y solo queda 1 campo
      //   puesto → "a veces copia algo, a veces no, se deja datos". (Cuando el doc
      //   YA existe, el bundle usa updateDoc granular y por eso a veces sí iba.)
      //
      // SOLUCIÓN: no tocar el handler del bundle. Construimos los registros
      //   objetivo y los escribimos DE UNA SOLA VEZ con nuestra app Firebase
      //   secundaria (__uaDb, la de "ÚLTIMA ACT."):
      //     · doc EXISTE  → un único update() con rutas punteadas
      //                     registros.<vid>.<campo> (granular, no pisa nada).
      //     · doc NO existe → un único set(..., {merge:true}) creándolo con
      //                     turno/fechaStr/timestamp/vehiculosOrden + registros.
      //   Una sola escritura ⇒ imposible que se pisen ⇒ 100% fiable. El bundle lo
      //   recoge por su onSnapshot y repinta las celdas. Si Firebase no está
      //   disponible, cae al motor antiguo por fibers (nunca peor que hoy).
      //
      //   destino : 'NOCHE' | 'URBANIZACIONES' | 'TARDE'
      //   planFn(props) : objetivo {estado,cargaNo,cargaSiTipo,otros} de esa
      //                   fila, o null si la fila no participa.
      //   onDone(aplicadas, objetivo) : aviso final.
      // ═══════════════════════════════════════════════════════════════════════

      // Clave de fecha comparable (numérica, sin ceros a la izquierda) a partir de
      // "DD/MM/YYYY", "D/M/YYYY", "DD-MM-YYYY" o "YYYY-MM-DD". Devuelve "D-M-YYYY".
      function __lkFechaKey(s) {
        if (!s) return null;
        var p = String(s).split(/[\/\-]/);
        if (p.length !== 3) return null;
        if (p[0].length === 4) return parseInt(p[2], 10) + '-' + parseInt(p[1], 10) + '-' + p[0]; // YYYY-MM-DD
        return parseInt(p[0], 10) + '-' + parseInt(p[1], 10) + '-' + p[2];                         // DD-MM-YYYY | D/M/YYYY
      }
      // Fecha actual como "DD/MM/YYYY" (con ceros), formato del campo fechaStr.
      function __lkFechaStrActual() {
        var f = __lkReadFechaActual();
        if (!f) return null;
        var p = String(f).split('-');

        function pad(x) { x = String(x); return x.length < 2 ? '0' + x : x; }

      }
      // Info del doc destino para el turno+fecha actuales.
      // Devuelve {id, fechaStr, exists, vehiculosOrden}. Si no está en memoria,
      // compone el id estándar y usa allVids (orden del DOM) como vehiculosOrden.
      function __lkDestinoDocInfo(destino, allVids) {
        var fStr = __lkFechaStrActual();
        var info = { id: null, fechaStr: fStr, exists: false, vehiculosOrden: allVids || [] };
        try {
          var servicios = __lkReadServicios();
          var claveHoy = __lkFechaKey(fStr);
          if (servicios && claveHoy) {
            var ordenMismoDia = null;   // orden canónico de cualquier turno del MISMO día
            for (var i = 0; i < servicios.length; i++) {
              var s = servicios[i];
              if (!s || __lkFechaKey(s.fechaStr) !== claveHoy) continue;
              if (!ordenMismoDia && Array.isArray(s.vehiculosOrden) && s.vehiculosOrden.length) ordenMismoDia = s.vehiculosOrden;
              if (s.turno === destino) {

                info.fechaStr = s.fechaStr;

            // (como hace el bundle: toma vehiculosOrden de URB/TARDE de esa fecha),
            // y solo como último recurso el orden del DOM (allVids).
            if (!info.exists && ordenMismoDia) info.vehiculosOrden = ordenMismoDia;

        }

      }
      // Referencia al doc de servicios con NUESTRA app secundaria (misma ruta que el watcher).
      function __lkServicioDocRef(db, id) {

      // Indicador "Copiando…" NO bloqueante (pointer-events:none) para dar feedback

      // try/catch → nunca rompe la copia aunque el DOM no esté disponible.

            st.textContent = '@keyframes __lkspin{to{transform:rotate(360deg)}}';
            document.head.appendChild(st);

            d.innerHTML = '<div style="background:#fff;border-radius:14px;padding:16px 22px;font-size:14px;font-weight:bold;color:#1f2937;box-shadow:0 20px 40px rgba(0,0,0,0.3);display:flex;align-items:center;gap:12px">' +
              '<span style="width:18px;height:18px;border:3px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;display:inline-block;animation:__lkspin 0.8s linear infinite"></span>' +

      function __lkApplyByFiber(destino, planFn, onDone) {
        var datKey = destino === 'NOCHE' ? 'nDatos' : (destino === 'URBANIZACIONES' ? 'uDatos' : 'tDatos');
        try {
          var trs = document.querySelectorAll('tbody tr');
          var vistos = {}, allVids = [], targets = {};
          var objetivo = 0, difieren = 0;
          for (var i = 0; i < trs.length; i++) {
            var props = __lkReadRowFiber(trs[i]);
            if (!props) continue;
            var vid = String(props.vehiculoId);
            if (vistos[vid]) continue;          // misma fila puede repetirse en el DOM
            vistos[vid] = 1;
            allVids.push(vid);                  // orden real (para vehiculosOrden si hay que crear el doc)

            var plan = null;
            try { plan = planFn(props); } catch (e) { plan = null; }
            if (!plan) continue;                // esta fila no participa
            objetivo++;

            // ¿El destino ya coincide con el objetivo? (para no reescribir de más)
            var cur = props[datKey] || {};
            var igual = true;
            for (var f = 0; f < __LK_FIELDS.length; f++) {

            // al reconectar; avisamos honestamente en vez de dejar el spinner colgado.

            function () { if (__settled) return; __settled = true; clearTimeout(__to); __lkHideBusy(); try { onDone(objetivo, objetivo); } catch (e) {} },
            function () { if (__settled) return; __settled = true; clearTimeout(__to); __lkHideBusy(); try { __lkApplyByFiberBundle(destino, planFn, onDone); } catch (e) {} } // Firebase caído → motor antiguo

      // Motor ANTIGUO por fibers (llama a onUpdateX del bundle, verifica y reintenta).
      // Se conserva SOLO como último recurso si la escritura directa a Firestore no
      // puede ejecutarse (Firebase secundario no carga). Puede ser poco fiable con
      // documentos aún inexistentes (ver explicación arriba), pero nunca es peor que
      // el comportamiento anterior.
      function __lkApplyByFiberBundle(destino, planFn, onDone) {
        var updKey = destino === 'NOCHE' ? 'onUpdateN' : (destino === 'URBANIZACIONES' ? 'onUpdateU' : 'onUpdateT');
        var datKey = destino === 'NOCHE' ? 'nDatos'   : (destino === 'URBANIZACIONES' ? 'uDatos'    : 'tDatos');

        function pass(intento) {
          try {
            var trs = document.querySelectorAll('tbody tr');
            var vistos = {};
            var objetivo = 0, coinciden = 0, pendientes = 0;
            for (var i = 0; i < trs.length; i++) {
              var props = __lkReadRowFiber(trs[i]);
              if (!props) continue;
              var update = props[updKey];
              if (typeof update !== 'function') continue;
              var vid = String(props.vehiculoId);
              if (vistos[vid]) continue;        // misma fila puede repetirse en el DOM

              var plan = null;
              try { plan = planFn(props); } catch (e) { plan = null; }
              if (!plan) continue;              // esta fila no participa
              vistos[vid] = 1;
              objetivo++;

              // ¿El destino ya coincide con el objetivo?
              var cur = props[datKey] || {};
              var igual = true;
              for (var f = 0; f < __LK_FIELDS.length; f++) {
                if (__lkNorm(cur[__LK_FIELDS[f]], __LK_FIELDS[f]) !== __lkNorm(plan[__LK_FIELDS[f]], __LK_FIELDS[f])) { igual = false; break; }
              }
              if (igual) { coinciden++; continue; }

              // Aún no coincide → (re)escribir los 4 campos.
              for (var g = 0; g < __LK_FIELDS.length; g++) {
                try { update(props.vehiculoId, __LK_FIELDS[g], __lkNorm(plan[__LK_FIELDS[g]], __LK_FIELDS[g])); } catch (e) {}
              }
              pendientes++;
            }

            // Aún quedan filas sin cuajar → otra pasada tras dejar respirar a React.
            if (pendientes > 0 && intento < 8) {
              setTimeout(function() { pass(intento + 1); }, 160);
              return;
            }
            try { onDone(coinciden, objetivo); } catch (e) {}
          } catch (e) {}
        }

      }

      // Resuelve el doc de TARDE de ayer (reintentando si aún se está cargando)
      // y lanza la copia hacia NOCHE. soloAveriados=true → solo estado === 'A'.
      function __lkResolveTardeAyer(soloAveriados, intento) {
        try {
          var fechaRaw = __lkReadFechaActual();
          if (!fechaRaw) { __lkShowAlert('No se pudo leer la fecha actual.'); return; }
          var parts = fechaRaw.split('-');
          var ayerDate;
          if (parts[0].length === 4) {
            ayerDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]) - 1);
          } else {
            ayerDate = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]) - 1);
          }

          var mm = String(ayerDate.getMonth() + 1).padStart(2, '0');
          var yyyy = ayerDate.getFullYear();

          var f1 = dd + '/' + mm + '/' + yyyy;                                                  // "18/05/2026"
          var f2 = String(ayerDate.getDate()) + '/' + String(ayerDate.getMonth() + 1) + '/' + yyyy; // "18/5/2026"

          var servicios = __lkReadServicios();
          var docTarde = null;
          if (servicios) {
            for (var i = 0; i < servicios.length; i++) {
              var sv = servicios[i];
              if (sv.turno === 'TARDE' && (sv.fechaStr === f1 || sv.fechaStr === f2)) { docTarde = sv; break; }
            }
          }
          if (!docTarde || !docTarde.registros) {
            // Puede que los datos de ayer aún se estén cargando en memoria: reintentar.
            if (intento < 6) { setTimeout(function() { __lkResolveTardeAyer(soloAveriados, intento + 1); }, 200); return; }
            __lkShowAlert('No hay datos de TARDE del ' + etq + '.');
            return;
          }

          var regs = docTarde.registros;
          __lkApplyByFiber('NOCHE',
            function(props) {
              var r = regs[String(props.vehiculoId)];
              if (!r) return null;
              if (soloAveriados && r.estado !== 'A') return null;
              return __lkPick4(r);
            },
            function(aplicadas, objetivo) {

                __lkShowAlert(soloAveriados

              } else {
                __lkShowAlert('Copiados ' + aplicadas + ' de ' + objetivo + (soloAveriados ? ' averiados' : ' registros') + '. Vuelve a pulsar para completar.');
              }
            }
          );
        } catch (e) {}
      }
