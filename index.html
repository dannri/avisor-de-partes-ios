  <style>
    body { margin: 0; padding: 0; }
    /* iPad PWA: respect safe areas (notch / home indicator) */
    @supports (padding: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        background: #161040;
      }
    }
    /* Prevent overscroll bounce on iPad Safari */
    html, body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    /* Block pinch-zoom on iPad Safari (iOS 26 ignores user-scalable=no) */
    html, body { touch-action: pan-x pan-y; }

    /* Sustituir el tinte azul claro de las filas de la tabla por gris claro.
       El bundle de la app usa Tailwind: blue-50/100 para fondos pares/impares. */
    table tr td.bg-blue-50,
    table tr td.bg-blue-100,
    table tr td[class*="bg-blue-50"],
    table tr td[class*="bg-blue-100"] {
      background-color: #f3f4f6 !important; /* gray-100 */
    }
    table tr td[style*="background-color: rgb(239, 246, 255)"],
    table tr td[style*="background-color: rgb(219, 234, 254)"],
    table tr td[style*="background: rgb(239, 246, 255)"],
    table tr td[style*="background: rgb(219, 234, 254)"] {
      background-color: #f3f4f6 !important;
    }
    table tr.bg-blue-50,
    table tr.bg-blue-100,
    table tr[class*="bg-blue-50"],
    table tr[class*="bg-blue-100"] {
      background-color: #f3f4f6 !important;
    }

    /* Force every table row to have a fixed height regardless of content/zoom.
       The "gap before row 3137" happens because the LEFT cell with rowspan
       (group label "CARGAS LATERALES" rendered with writing-mode vertical)
       expands when the browser thinks more height is available (e.g. after
       a pinch-zoom out). The row-span cell drags all the rows it covers
       with it. We have to clamp the row height AND the rotated label cell. */
    table tr[data-uniform-row="1"] {
      height: 40px !important;
      max-height: 40px !important;
      min-height: 40px !important;
      flex: 0 0 40px !important;          /* if some parent went flex */
      display: table-row !important;       /* refuse to be a flex item */
      line-height: 1 !important;
    }
    /* Regular cells (NOT group-cells with rowspan): hard-clamped to 40px */
    table tr[data-uniform-row="1"] > td:not([data-group-cell="1"]),
    table tr[data-uniform-row="1"] > th:not([data-group-cell="1"]) {
      height: 40px !important;
      max-height: 40px !important;
      min-height: 40px !important;
      overflow: hidden !important;
      vertical-align: middle !important;
      box-sizing: border-box !important;
    }
    /* If the table is wrapped in a flex container that stretches it, neutralise it */
    table[data-flat-table="1"] {
      height: auto !important;
      max-height: none !important;
      min-height: 0 !important;
      flex: 0 0 auto !important;
      display: table !important;
      table-layout: auto !important;
    }
    table[data-flat-table="1"] tbody {
      height: auto !important;
      max-height: none !important;
      min-height: 0 !important;
      display: table-row-group !important;
    }
    /* Vertical group-label cells ("CARGAS LATERALES" / "CARGAS TRASERAS"):
       they have writing-mode vertical and a rowspan. Their inline height/
       max-height is set by unifyTableGroups() to exactly rs*40px so a
       cell with rowspan=1 cannot ask for more than 40px even if the rotated
       text would prefer more. We kill line-height + overflow so the
       clipped text doesn't push the cell taller. */
    table td[data-group-cell="1"],
    table th[data-group-cell="1"] {
      line-height: 1 !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
      min-height: 0 !important;
    }
    /* ROOT FIX for "row 3137 stretch" on iPhone Safari:
       WebKit table layout ignores max-height on <td> — this is a known,
       documented limitation. The ONLY reliable fix is to ensure the cell
       content naturally fits within rowspan*40px so the browser never
       needs to grow the row.
       For rotated label cells (writing-mode vertical) with rowspan <= 2,
       unifyTableGroups() sets data-small-rs="1" and zeros font-size,
       line-height and vertical padding. Content height becomes 0px so
       Safari uses our advisory height:Npx — row stays exactly 40px.
       Large-rowspan cells (the main "CARGAS LATERALES" label spanning
       many rows) are left untouched and keep their rotated appearance. */
    table td[data-small-rs="1"],
    table th[data-small-rs="1"] {
      font-size: 0px !important;
      line-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    /* Safety net for the period BEFORE unifyTableGroups runs (or if it
       misses a cycle): any cell with rowspan=1 is forced to 40px max,
       regardless of writing-mode. Cells with rowspan>=2 are left alone
       because the rowspan itself defines their height through the rows. */
    table tr > td[rowspan="1"],
    table tr > th[rowspan="1"],
    table tr > td:not([rowspan]),
    table tr > th:not([rowspan]) {
      max-height: 40px !important;
      overflow: hidden !important;
    }

    /* Password gate (loads before the app) */
    #__gate__ {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #161040 0%, #0d1035 45%, #07080f 100%);
      z-index: 2147483647;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #__gate__ .card {
      background: rgba(255,255,255,0.05);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 32px;
      width: 86%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    #__gate__ h1 {
      color: #fff; font-size: 16px; font-weight: 700;
      margin: 0 0 24px; text-align: center; letter-spacing: 2px;
    }
    #__gate__ input {
      width: 100%; box-sizing: border-box;
      padding: 14px 16px; font-size: 17px;
      background: rgba(255,255,255,0.08);
      color: #fff; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; outline: none;
      -webkit-appearance: none; appearance: none;
      letter-spacing: 4px; text-align: center;
    }
    #__gate__ input::placeholder { letter-spacing: normal; color: rgba(255,255,255,0.4); }
    #__gate__ input:focus { border-color: #5eadff; background: rgba(255,255,255,0.12); }
    #__gate__ button {
      width: 100%; margin-top: 14px; padding: 14px;
      background: #3b82f6; color: #fff; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #__gate__ button:disabled { opacity: 0.5; }
    #__gate__ .err { color: #ff6b6b; font-size: 14px; text-align: center; min-height: 20px; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Password gate -->
  <div id="__gate__">
    <div class="card">
      <h1>AVISOR DE PARTES</h1>
      <input type="password" id="__gate_pwd__" placeholder="Contraseña" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <button id="__gate_ok__">Entrar</button>
      <div class="err" id="__gate_err__"></div>
    </div>
  </div>

  <script>
    (function () {
      var HASH = '8a09fbac5bb13bf413f26b00ce426e59a8aeab7aa9e593dc31a58a958cc23fbc';
      var SALT = 'avisor-partes-2026-iPad';
      var ITERATIONS = 250000;
      var STORAGE_KEY = '__avisor_auth_v2__';
      var LOCK_KEY = '__avisor_lock_v1__';

      // Rate-limit de intentos fallidos:
      //   1-4 fallos: sin bloqueo
      //   5  fallos: 5 minutos
      //   6-9       : 5 minutos
      //   10-19     : 1 hora
      //   20+       : 24 horas
      // Persiste en localStorage. Un atacante puede limpiarlo borrando
      // datos de Safari, pero eso es fricción suficiente para descartar
      // ataques automatizados casuales.
      function getLock() {
        try {
          var raw = localStorage.getItem(LOCK_KEY);
          if (!raw) return { attempts: 0, lockUntil: 0 };
          var obj = JSON.parse(raw);
          return { attempts: obj.attempts|0, lockUntil: obj.lockUntil|0 };
        } catch (e) { return { attempts: 0, lockUntil: 0 }; }
      }
      function saveLock(l) {
        try { localStorage.setItem(LOCK_KEY, JSON.stringify(l)); } catch (e) {}
      }
      function clearLock() {
        try { localStorage.removeItem(LOCK_KEY); } catch (e) {}
      }
      function lockDurationFor(attempts) {
        if (attempts < 5)  return 0;
        if (attempts < 10) return 5  * 60 * 1000;
        if (attempts < 20) return 60 * 60 * 1000;
        return 24 * 60 * 60 * 1000;
      }
      function fmtRemaining(ms) {
        var s = Math.ceil(ms / 1000);
        if (s < 60)    return s + ' s';
        var m = Math.ceil(s / 60);
        if (m < 60)    return m + ' min';
        var h = Math.ceil(m / 60);
        return h + ' h';
      }

      function pbkdf2Hex(pwd) {
        var enc = new TextEncoder();
        return crypto.subtle.importKey(
          'raw', enc.encode(pwd), { name: 'PBKDF2' }, false, ['deriveBits']
        ).then(function (key) {
          return crypto.subtle.deriveBits(
            { name: 'PBKDF2', salt: enc.encode(SALT), iterations: ITERATIONS, hash: 'SHA-256' },
            key, 256
          );
        }).then(function (bits) {
          var arr = new Uint8Array(bits);
          var hex = '';
          for (var i = 0; i < arr.length; i++) {
            hex += (arr[i] < 16 ? '0' : '') + arr[i].toString(16);
          }
          return hex;
        });
      }

      function loadApp() {
        var gate = document.getElementById('__gate__');
        if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
        var css = document.createElement('link');
        css.rel = 'stylesheet'; css.crossOrigin = ''; css.href = './assets/app.css';
        document.head.appendChild(css);
        var s = document.createElement('script');
        s.type = 'module'; s.crossOrigin = ''; s.src = './assets/app.js';
        document.head.appendChild(s);
      }

      // Already authenticated on this device?
      try {
        if (localStorage.getItem(STORAGE_KEY) === '1') {
          loadApp();
          return;
        }
      } catch (e) {}

      var input = document.getElementById('__gate_pwd__');
      var btn = document.getElementById('__gate_ok__');
      var err = document.getElementById('__gate_err__');
      var __lockTimer = null;

      function applyLockUI(remainingMs) {
        if (__lockTimer) { clearTimeout(__lockTimer); __lockTimer = null; }
        btn.disabled = true;
        input.disabled = true;
        input.value = '';
        err.textContent = 'Demasiados intentos. Espera ' + fmtRemaining(remainingMs) + '.';
        __lockTimer = setTimeout(function () {
          var lock = getLock();
          var rem = lock.lockUntil - Date.now();
          if (rem > 0) {
            applyLockUI(rem);
          } else {
            btn.disabled = false;
            input.disabled = false;
            err.textContent = '';
            try { input.focus(); } catch (e) {}
          }
        }, Math.min(remainingMs, 1000));
      }

      function tryAuth() {
        var lock = getLock();
        var now = Date.now();
        if (lock.lockUntil > now) {
          applyLockUI(lock.lockUntil - now);
          return;
        }
        btn.disabled = true;
        err.textContent = 'Comprobando...';
        pbkdf2Hex(input.value).then(function (hex) {
          if (hex === HASH) {
            clearLock();
            try { localStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
            loadApp();
          } else {
            // Fallo: incrementar contador y aplicar bloqueo si toca
            var l = getLock();
            l.attempts = (l.attempts|0) + 1;
            var dur = lockDurationFor(l.attempts);
            if (dur > 0) l.lockUntil = Date.now() + dur;
            saveLock(l);
            if (dur > 0) {
              applyLockUI(dur);
            } else {
              btn.disabled = false;
              err.textContent = 'Contraseña incorrecta';
              input.value = '';
              try { input.focus(); } catch (e) {}
            }
          }
        }).catch(function (e) {
          btn.disabled = false;
          err.textContent = 'Error: ' + (e && e.message ? e.message : 'desconocido');
        });
      }

      // Al cargar el gate, si ya hay bloqueo activo desde antes, aplicarlo
      (function checkInitialLock() {
        var lock = getLock();
        var rem = lock.lockUntil - Date.now();
        if (rem > 0) applyLockUI(rem);
      })();

      btn.addEventListener('click', tryAuth);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryAuth(); });
      // Focus after a tick so iOS shows the keyboard
      setTimeout(function () { try { if (!input.disabled) input.focus(); } catch (e) {} }, 100);
    })();
  </script>
  <script>
    (function () {
      function stripDiacritics(s) {
        return s.normalize ? s.normalize('NFD').replace(/[̀-ͯ]/g, '') : s;
      }

      function findMenuBackButton() {
        var els = document.querySelectorAll('button, [role="button"]');
        for (var i = 0; i < els.length; i++) {
          if (els[i].id === '__refresh-btn__') continue;
          var raw = (els[i].textContent || '').trim();
          if (raw.length === 0 || raw.length > 15) continue;
          var clean = stripDiacritics(raw.toUpperCase()).replace(/[^A-Z]/g, '');
          if (clean === 'MENU' || clean === 'XMENU') return els[i];
        }
        return null;
      }

      function getCurrentScreenLabel() {
        var nodes = document.querySelectorAll('h1, h2, h3, span, div, p');
        var best = null;
        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          if (n.children.length > 2) continue;
          var rect = n.getBoundingClientRect();
          if (rect.top < 0 || rect.top > 90) continue;
          if (rect.width === 0) continue;
          var t = (n.textContent || '').trim();
          if (t.length < 4 || t.length > 60) continue;
          if (/^[\d\s\/\-:.]+$/.test(t)) continue;
          var up = stripDiacritics(t.toUpperCase());
          if (up.indexOf('MEN') === 0 && t.length < 8) continue;
          if (!best || t.length > best.length) best = t;
        }
        return best;
      }

      function tryRestoreNavigation() {
        var label = sessionStorage.getItem('__restoreScreen__');
        if (!label) return;
        var keywords = stripDiacritics(label.toUpperCase()).split(/\s+/).filter(function (w) { return w.length >= 4; });
        if (keywords.length === 0) { sessionStorage.removeItem('__restoreScreen__'); return; }

        var attempts = 0;
        var iv = setInterval(function () {
          attempts++;
          var cards = document.querySelectorAll('button, [role="button"]');
          for (var i = 0; i < cards.length; i++) {
            if (cards[i].id === '__refresh-btn__') continue;
            var t = stripDiacritics((cards[i].textContent || '').toUpperCase());
            if (t.length === 0 || t.length > 40) continue;
            for (var k = 0; k < keywords.length; k++) {
              var prefix = keywords[k].substring(0, 5);
              if (prefix.length >= 4 && t.indexOf(prefix) !== -1) {
                sessionStorage.removeItem('__restoreScreen__');
                clearInterval(iv);
                try { cards[i].click(); } catch (e) {}
                return;
              }
            }
          }
          if (attempts >= 30) {
            sessionStorage.removeItem('__restoreScreen__');
            clearInterval(iv);
          }
        }, 200);
      }

      function injectRefreshButton() {
        var menuBtn = findMenuBackButton();
        var existing = document.getElementById('__refresh-btn__');

        // Not on a sub-screen — remove any leftover refresh button
        if (!menuBtn) {
          if (existing && existing.parentElement) existing.parentElement.removeChild(existing);
          return;
        }

        var mr = menuBtn.getBoundingClientRect();
        var mrCenterY = mr.top + mr.height / 2;
        var mrRight = mr.right;

        // Validate existing button: must be vertically near MENU and to its right
        if (existing) {
          var er = existing.getBoundingClientRect();
          var erCenterY = er.top + er.height / 2;
          if (er.width === 0 || er.height === 0 ||
              Math.abs(erCenterY - mrCenterY) > 25 ||
              er.left < mrRight - 5) {
            if (existing.parentElement) existing.parentElement.removeChild(existing);
            existing = null;
          } else {
            return;
          }
        }

        var all = document.querySelectorAll('button, [role="button"]');
        var groupsArr = [];
        var seenParents = [];
        for (var i = 0; i < all.length; i++) {
          var el = all[i];
          if (el.id === '__refresh-btn__') continue;
          if (el === menuBtn) continue;
          if (!el.querySelector('svg')) continue;
          var txt = (el.textContent || '').replace(/\s/g, '');
          if (txt.length > 2) continue;
          var rect = el.getBoundingClientRect();
          if (rect.width === 0 || rect.height === 0) continue;
          var elCenterY = rect.top + rect.height / 2;
          // Must be vertically aligned with MENU (same header row)
          if (Math.abs(elCenterY - mrCenterY) > 25) continue;
          // Must be to the right of MENU (where the icon cluster lives)
          if (rect.left < mrRight - 5) continue;
          var p = el.parentElement;
          if (!p) continue;
          var idx = seenParents.indexOf(p);
          if (idx === -1) {
            seenParents.push(p);
            groupsArr.push({ parent: p, items: [{ el: el, left: rect.left, top: rect.top }] });
          } else {
            groupsArr[idx].items.push({ el: el, left: rect.left, top: rect.top });
          }
        }

        var candidates = groupsArr.filter(function (g) { return g.items.length >= 2; });
        if (candidates.length === 0) return;

        candidates.sort(function (a, b) {
          if (b.items.length !== a.items.length) return b.items.length - a.items.length;
          return a.items[0].top - b.items[0].top;
        });
        var best = candidates[0];
        best.items.sort(function (a, b) { return a.left - b.left; });
        var template = best.items[0].el;
        var parent = best.parent;

        var btn = document.createElement('button');
        btn.id = '__refresh-btn__';
        btn.className = template.className;
        btn.title = 'Actualizar datos';
        btn.style.display = template.style.display || '';
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:auto"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>';

        function handleClick(e) {
          e.preventDefault();
          e.stopPropagation();
          if (e.stopImmediatePropagation) e.stopImmediatePropagation();
          if (btn.dataset.clicked === '1') return;
          btn.dataset.clicked = '1';
          btn.style.opacity = '0.5';
          btn.style.pointerEvents = 'none';
          var label = getCurrentScreenLabel();
          if (label) sessionStorage.setItem('__restoreScreen__', label);
          // small delay so the visual feedback shows
          setTimeout(function () { window.location.reload(); }, 30);
        }
        btn.addEventListener('click', handleClick, true);
        btn.addEventListener('touchend', handleClick, true);

        parent.insertBefore(btn, template);
      }

      function injectPartesGlow() {
        var buttons = document.querySelectorAll('button');
        for (var i = 0; i < buttons.length; i++) {
          var b = buttons[i];
          if (b.dataset.glowFixed === '1') continue;
          var txt = (b.textContent || '').toUpperCase();
          if (txt.indexOf('PARTES') === -1 && txt.indexOf('INCIDENCIAS') === -1) continue;

          b.dataset.glowFixed = '1';
          b.style.boxShadow = '0 0 24px 4px rgba(245,158,11,0.5), 0 0 60px 2px rgba(245,158,11,0.15), inset 0 0 20px 0px rgba(245,158,11,0.1)';
          b.style.position = b.style.position || 'relative';
          b.style.overflow = 'hidden';
          if (!b.classList.contains('card-hover-shine')) b.classList.add('card-hover-shine');
          if (!b.querySelector('.__glow-shine__')) {
            var shine = document.createElement('div');
            shine.className = 'card-shine-sweep __glow-shine__';
            b.appendChild(shine);
          }
        }
      }

      function replaceBgWithSVG() {
        var s = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice">';
        s += '<defs>';
        s += '<linearGradient id="inj_bg" x1="0%" y1="0%" x2="100%" y2="100%">';
        s += '<stop offset="0%" stop-color="#161040"/>';
        s += '<stop offset="45%" stop-color="#0d1035"/>';
        s += '<stop offset="100%" stop-color="#07080f"/>';
        s += '</linearGradient>';
        s += '<radialGradient id="inj_ambL" cx="300" cy="250" r="420" gradientUnits="userSpaceOnUse">';
        s += '<stop offset="0%" stop-color="#2a1a70" stop-opacity="0.45"/>';
        s += '<stop offset="100%" stop-color="#0d1035" stop-opacity="0"/>';
        s += '</radialGradient>';
        s += '<radialGradient id="inj_ambR" cx="980" cy="580" r="360" gradientUnits="userSpaceOnUse">';
        s += '<stop offset="0%" stop-color="#1a1558" stop-opacity="0.35"/>';
        s += '<stop offset="100%" stop-color="#07080f" stop-opacity="0"/>';
        s += '</radialGradient>';
        s += '<radialGradient id="inj_glowB" cx="50%" cy="50%" r="50%">';
        s += '<stop offset="0%" stop-color="#5eadff" stop-opacity="0.95"/>';
        s += '<stop offset="40%" stop-color="#3b82f6" stop-opacity="0.4"/>';
        s += '<stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>';
        s += '</radialGradient>';

            var p = node.memoizedProps;
            if (p && typeof p.vehiculoId !== 'undefined' &&
                typeof p.onUpdateN === 'function' &&
                typeof p.onUpdateU === 'function' &&
                typeof p.onUpdateT === 'function') {
              return p;
            }
            node = node.return;
          }
        } catch (e) {}
        return null;
      }

      // Realiza la copia turnoFuente → turnoDestino en todas las filas visibles.
      function __lkCopyTurno(fuente, destino) {
        try {
          // Verificar que el candado destino está abierto
          var turnoActivo = __lkReadTurnoActivo();
          if (turnoActivo !== destino) {
            __lkShowAlert('Para copiar a ' + destino + ', primero desbloquea su candado.');
            return false;
          }

          var trs = document.querySelectorAll('tbody tr');
          var count = 0;
          var fields = ['estado', 'cargaNo', 'cargaSiTipo', 'otros'];
          var srcKey = fuente === 'NOCHE' ? 'nDatos' : 'uDatos';
          var updKey = destino === 'URBANIZACIONES' ? 'onUpdateU' : 'onUpdateT';

          for (var i = 0; i < trs.length; i++) {
            var props = __lkReadRowFiber(trs[i]);
            if (!props) continue;
            var src = props[srcKey];
            var update = props[updKey];
            if (!src || typeof update !== 'function') continue;
            for (var f = 0; f < fields.length; f++) {
              var field = fields[f];
              var val = src[field];
              // Pasar todos los campos (incluso null/false/"") para sobreescribir el destino
              if (typeof val === 'undefined') val = (field === 'cargaNo' ? false : (field === 'estado' ? null : ''));
              try { update(props.vehiculoId, field, val); } catch (e) {}
            }
            count++;
          }
          return count;
        } catch (e) {
          return false;
        }
      }

      // Inyección DOM (sin fibers en loop): añade botones candado y actualiza su estado.
      function injectEstadoLocks() {
        var ths = document.querySelectorAll('th');
        var found = { NOCHE: null, URBANIZACIONES: null, TARDE: null };
        for (var i = 0; i < ths.length; i++) {
          if (ths[i].colSpan < 5) continue;
          var raw = (ths[i].textContent || '').trim().toUpperCase();
          // Quitar texto extra del botón inyectado para comparar el nombre puro
          var pure = raw.replace(/[^A-ZÁÉÍÓÚÜÑ]/g, '');
          if (pure === 'NOCHE') found.NOCHE = ths[i];
          else if (pure === 'URBANIZACIONES') found.URBANIZACIONES = ths[i];
          else if (pure === 'TARDE') found.TARDE = ths[i];
        }
        if (!found.NOCHE || !found.URBANIZACIONES || !found.TARDE) return;

        var PASSWORDS = { NOCHE: '1020', URBANIZACIONES: '1030', TARDE: '1040' };

        // 1ª pasada: crear botones si faltan (sin tocar fiber)
        var missingAny = false;
        ['NOCHE', 'URBANIZACIONES', 'TARDE'].forEach(function(turno) {
          var th = found[turno];
          if (!th.querySelector('[data-lock-btn]')) {
            missingAny = true;
            var btn = document.createElement('button');
            btn.setAttribute('data-lock-btn', turno);
            btn.type = 'button';
            __lkStyleBtn(btn, false);
            btn.dataset.state = 'closed';
            btn.onclick = function(e) {
              e.preventDefault();
              e.stopPropagation();
              __lkOnClick(turno, PASSWORDS[turno]);
              setTimeout(__lkRefreshBtnStates, 120);
            };
            th.appendChild(btn);
          }

          // Botón de copia solo en URB y TARDE
          if (turno !== 'NOCHE' && !th.querySelector('[data-copy-btn]')) {
            var cbtn = document.createElement('button');
            cbtn.setAttribute('data-copy-btn', turno);
            cbtn.type = 'button';
            __lkStyleCopyBtn(cbtn);
            var fuente = (turno === 'URBANIZACIONES') ? 'NOCHE' : 'URBANIZACIONES';
            cbtn.title = 'Copiar datos de ' + fuente;
            (function(f, d) {
              cbtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                __lkShowCopyConfirm(f, d);
              };
            })(fuente, turno);
            th.appendChild(cbtn);
          }

          // Botón papelera (vaciar) en los tres turnos
          if (!th.querySelector('[data-trash-btn]')) {
            var tbtn = document.createElement('button');
            tbtn.setAttribute('data-trash-btn', turno);
            tbtn.type = 'button';
            __lkStyleTrashBtn(tbtn);
            tbtn.title = 'Vaciar plantilla de ' + turno;
            (function(d) {
              tbtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                __lkShowClearConfirm(d);
              };
            })(turno);
            th.appendChild(tbtn);
          }
        });

        // Si acabamos de crear botones, leer fiber una vez para sincronizar
        if (missingAny) __lkRefreshBtnStates();
      }

      function __lkRefreshBtnStates() {
        try {
          var turnoActivo = __lkReadTurnoActivo();
          var btns = document.querySelectorAll('[data-lock-btn]');
          for (var i = 0; i < btns.length; i++) {
            var b = btns[i];
            var turno = b.getAttribute('data-lock-btn');
            var isUnlocked = (turnoActivo === turno);
            var desired = isUnlocked ? 'open' : 'closed';
            if (b.dataset.state !== desired) {
              __lkStyleBtn(b, isUnlocked);
              b.dataset.state = desired;
            }
          }
        } catch (e) {}
      }

      // Lee el estado del candado SIN tocar fiber, mirando el data-state del botón
      function __lkLeerEstadoCandadoDOM() {
        var btn = document.querySelector('[data-lock-btn][data-state="open"]');
        if (!btn) return null;
        return btn.getAttribute('data-lock-btn');
      }

      // Lee datos puramente del DOM: cada <tr> tiene 1 columna nº + N columnas por turno.
      // Por la estructura del bundle: vehículo | NOCHE(AV,DP,NO,SI/TIPO,OTROS) | nº | URB(...) | nº | TARDE(...)
      // Pero en ESTADO COMPLETO hay nº repetido entre turnos. Para evitar errores,
      // detectamos las columnas por los <th> de la primera fila de cabeceras.
      var __cntCache = { ths: null, idx: null, lastTabla: null };

      function __cntComputarIndices() {
        // Estrategia: leer el thead y mapear el rango de columnas de cada turno.
        // Luego, dentro de cada rango, identificar AV / SI-TIPO / OTROS por nombre
        // de subcolumna en una fila inferior del thead (puede haber 2 ó 3 filas).
        try {
          var thead = document.querySelector('thead');
          if (!thead) return null;
          var headRows = thead.querySelectorAll('tr');
          if (headRows.length < 2) return null;

          // Fila 0 (de cabeceras agrupadas): NOCHE/URB/TARDE con colSpan>=5
          var grupos = headRows[0].querySelectorAll('th');
          var rangos = { NOCHE: null, URBANIZACIONES: null, TARDE: null };
          var colCursor = 0;
          for (var g = 0; g < grupos.length; g++) {
            var txt = (grupos[g].textContent || '').replace(/[^A-ZÁÉÍÓÚÜÑ]/g, '').toUpperCase();
            var span = grupos[g].colSpan || 1;
            if (txt === 'NOCHE' || txt === 'URBANIZACIONES' || txt === 'TARDE') {
              rangos[txt] = { start: colCursor, end: colCursor + span - 1 };
            }
            colCursor += span;
          }
          if (!rangos.NOCHE || !rangos.URBANIZACIONES || !rangos.TARDE) return null;

          // Subcolumnas: recorremos TODAS las filas del thead salvo la 1ª y construimos
          // un array de [columnaAbsoluta, textoSub] sumando colSpans correctamente
          // por fila.
          var subMap = {}; // colAbs -> nombre
          for (var r = 1; r < headRows.length; r++) {
            var ths2 = headRows[r].querySelectorAll('th');
            // Para esta fila, los th no cubren las columnas 'huérfanas' de filas
            // anteriores (rowSpan). Pero los th con texto que nos interesan
            // (AV/DP/NO/SI/TIPO/OTROS) aparecen siempre en alguna fila aquí abajo,
            // así que basta con asignarlos a la primera columna libre.
            // Solución más simple: dentro de cada rango de turno, vamos a usar
            // texto de los th que caigan dentro de ese rango, en el orden en que
            // aparecen. Como cada turno tiene EXACTAMENTE: AV, DP, NO, SÍ/TIPO, OTROS
            // (5 sub-columnas), basta con encontrar los 5 th dentro del rango.
          }

          // Estrategia más directa: para cada turno, dentro de su rango [start..end],
          // los 5 índices de columna serán los offsets start..start+4.
          // El orden de las sub-columnas en la app es FIJO: AV, DP, NO, SÍ/TIPO, OTROS.
          // Lo verificamos comprobando que la 2ª fila del thead, dentro del rango del
          // turno, contiene un th cuyo texto incluye "AV" en la posición start.
          var indices = {};
          ['NOCHE', 'URBANIZACIONES', 'TARDE'].forEach(function(turno) {
            var r0 = rangos[turno];
            indices[turno] = {
              av:     r0.start,
              dp:     r0.start + 1,
              no:     r0.start + 2,
              siTipo: r0.start + 3,
              otros:  r0.start + 4
            };
          });
          return indices;
        } catch (e) { return null; }
      }

      function __cntCellText(tr, idx) {
        var tds = tr.children;
        if (!tds || idx >= tds.length) return '';
        var td = tds[idx];
        return (td.textContent || '').trim();
      }

      function __cntEsRojoFuerte(bg) {
        if (!bg) return false;
        var m = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
        if (!m) return false;
        var r = +m[1], gg = +m[2], b = +m[3];
        // Rojo fuerte: rojo alto, verde+azul bajos. Excluye red-100 (254,226,226).
        if (r >= 200 && gg <= 110 && b <= 110 && (r - gg) > 100 && (r - b) > 100) return true;
        return false;
      }

      function __cntEsAveriadoDOM(tr) {
        // El vehículo averiado tiene fondo rojo en alguna de las primeras 3 celdas
        // (puede haber <th> lateral "CARGAS LATERALES" antes del nº vehículo).
        // Limitamos la búsqueda a las primeras celdas para no confundir con
        // celdas BASURA/CARTÓN del propio turno.
        try {
          var tds = tr.children;
          if (!tds || tds.length === 0) return false;
          // Buscar la celda "Nº vehículo" — es la 1ª <td> cuyo texto sea numérico (4 dígitos)
          var celdaVeh = null;
          for (var i = 0; i < Math.min(tds.length, 4); i++) {
            var raw = (tds[i].textContent || '').trim();
            // Quitar dígitos y comprobar si era 4 dígitos puros
            if (/^\d{4}$/.test(raw)) { celdaVeh = tds[i]; break; }
            // Si la celda contiene una cadena que empieza con 4 dígitos también vale
            if (/^\d{4}/.test(raw) && raw.length < 12) { celdaVeh = tds[i]; break; }
          }
          if (!celdaVeh) celdaVeh = tds[0]; // fallback

          // 1) Fondo computado de la celda del vehículo
          var cs = window.getComputedStyle(celdaVeh);
          if (__cntEsRojoFuerte(cs.backgroundColor || '')) return true;

          // 2) Fondo computado de cualquier hijo de la celda del vehículo
          var kids = celdaVeh.querySelectorAll('*');
          for (var k = 0; k < kids.length; k++) {
            var kcs = window.getComputedStyle(kids[k]);
            if (__cntEsRojoFuerte(kcs.backgroundColor || '')) return true;
          }

          // 3) Clase CSS que indique rojo (por si el bundle usa Tailwind con valores no estándar)
          var allHere = [celdaVeh].concat(Array.prototype.slice.call(kids));
          for (var kk = 0; kk < allHere.length; kk++) {
            var cn = (allHere[kk].className || '');
            if (typeof cn === 'string' && (cn.indexOf('bg-red-5') !== -1 ||
                cn.indexOf('bg-red-6') !== -1 || cn.indexOf('bg-red-7') !== -1)) {
              return true;
            }
          }

          // 4) Color del texto del nº vehículo: el bundle pinta el nº en color rojo/blanco
          //    cuando está averiado. Si el texto tiene color rojo intenso (rgb(255,255,255)
          //    sobre fondo rojo, o color: white sobre fondo rojo). Verificamos color.
          var csTxt = window.getComputedStyle(celdaVeh);
          var col = csTxt.color || '';
          // Si el color del texto es blanco y el fondo es oscuro (gradiente que perdimos),
          // intentemos detectar averiado por contraste: muchas apps ponen texto blanco sobre
          // fondo rojo. Pero podría ser una celda CARTÓN también. Limitamos al caso de que
          // background-image contenga "linear-gradient" rojo, común en Tailwind.
          var bgImg = csTxt.backgroundImage || '';
          if (bgImg && bgImg.indexOf('gradient') !== -1) {
            // Buscar tonos rojos en el gradient
            var matches = bgImg.match(/rgba?\([^)]+\)/g);
            if (matches) {
              for (var mi = 0; mi < matches.length; mi++) {
                if (__cntEsRojoFuerte(matches[mi])) return true;
              }
            }
          }
        } catch (e) {}
        return false;
      }

      // Bandera para que el MutationObserver no se autodispare al inyectar contadores
      var __cntMutating = false;

      function injectContadores() {
        // El contador es SIEMPRE visible cuando estamos en ESTADO COMPLETO,
        // tanto si está bloqueado como editando.

        // Limpiar cualquier overlay rojo residual de versiones anteriores
        var overlaysViejos = document.querySelectorAll('td[data-cnt-aver-overlay="1"]');
        if (overlaysViejos.length > 0) {

            delete tdRes.dataset.cntAverOverlay;
          }
          setTimeout(function(){ __cntMutating = false; }, 50);
        }

        // Encontrar la tabla principal y validar que estamos en ESTADO COMPLETO
        // (los <th> con colSpan>=5 que dicen NOCHE/URB/TARDE)
        var ths = document.querySelectorAll('th');
        var secciones = { NOCHE: null, URBANIZACIONES: null, TARDE: null };
        for (var i = 0; i < ths.length; i++) {
          if (ths[i].colSpan < 5) continue;
          var raw = (ths[i].textContent || '').replace(/[^A-ZÁÉÍÓÚÜÑ]/g, '').toUpperCase();
          if (raw === 'NOCHE') secciones.NOCHE = ths[i];
          else if (raw === 'URBANIZACIONES') secciones.URBANIZACIONES = ths[i];
          else if (raw === 'TARDE') secciones.TARDE = ths[i];
        }
        if (!secciones.NOCHE || !secciones.URBANIZACIONES || !secciones.TARDE) {

          var huerfanos = document.querySelectorAll('[id^="__cnt_"]');
          var overlays = document.querySelectorAll('td[data-cnt-aver-overlay="1"]');
          if (huerfanos.length > 0 || overlays.length > 0) {
            __cntMutating = true;
            for (var h = 0; h < huerfanos.length; h++) huerfanos[h].remove();
            for (var ov = 0; ov < overlays.length; ov++) {

              delete tdO.dataset.cntAverPrevShadow;
              delete tdO.dataset.cntAverOverlay;
            }
            setTimeout(function(){ __cntMutating = false; }, 50);
          }
          return;
        }

        var tabla = th0;
        while (tabla && tabla.tagName !== 'TABLE') tabla = tabla.parentNode;
        if (!tabla) return;

        // --- Computar rangos horizontales (x1..x2) de cada turno usando las cabeceras ---

        ['NOCHE','URBANIZACIONES','TARDE'].forEach(function(t) {
          var th = secciones[t];
          var r = th.getBoundingClientRect();
          rangos[t] = { left: r.left, right: r.right };
        });

        function turnoDeX(cx) {
          if (cx >= rangos.NOCHE.left && cx <= rangos.NOCHE.right) return 'NOCHE';
          if (cx >= rangos.URBANIZACIONES.left && cx <= rangos.URBANIZACIONES.right) return 'URBANIZACIONES';
          if (cx >= rangos.TARDE.left && cx <= rangos.TARDE.right) return 'TARDE';
          return null;
        }

        // Recorrer filas: cada <td> que CONTENGA "LLENO" = +1 camión en ese turno
        var trs = tabla.querySelectorAll('tbody tr');
        var datos = {
          NOCHE:          { disp: {}, aver: {} },
          URBANIZACIONES: { disp: {}, aver: {} },
          TARDE:          { disp: {}, aver: {} }

        // valor seleccionado (si está en placeholder devuelve ''). Si tiene <input>,
        // su value. Si tiene contenido mixto, clona y elimina <select>/<option> para
        // evitar leer la lista de opciones completa.
        function readCellText(td) {

            if (sel) {

            if (inp) {

            // y las eliminamos antes de leer textContent.
            if (td.querySelector('option, datalist')) {

              var del = clone.querySelectorAll('option, datalist');
              for (var di = 0; di < del.length; di++) del[di].remove();

          } catch (e) {

          }
        }

        // Valores que NUNCA son un tipo de residuo (texto de la columna NO/OTROS o estado)
        var TIPOS_INVALIDOS = ['SIN CARGA', 'TEXTO', 'LLENO', 'LLENO CON ANOTACIONES',
          'D', 'X', 'A', 'AV', 'DP', 'NO', 'SÍ', 'SI', 'SÍ/TIPO', 'SI/TIPO', 'OTROS'];

        function esTipoValido(s) {
          if (!s) return false;
          if (s.length > 20) return false; // textos largos = descripción de OTROS, no tipo
          // Texto que contiene LLENO o anotaciones largas
          if (s.indexOf('LLENO') !== -1) return false;
          if (s.indexOf('RUTA') === 0 || s.indexOf('TRAS') === 0) return false;
          if (s.indexOf('AVERIADO') !== -1) return false;
          if (s.indexOf('Nº') === 0 || s.indexOf('N°') === 0) return false; // "NºCONTENEDORES"
          // Reglas de valor explícito

        for (var j = 0; j < trs.length; j++) {

          var celdasPorTurno = { NOCHE: [], URBANIZACIONES: [], TARDE: [] };
          for (var c = 0; c < tds.length; c++) {

            if (rect.width === 0) continue;

            var t = turnoDeX(cx);
            if (t) celdasPorTurno[t].push({ idx: c, td: tds[c], cx: cx });

              if (tt === 'A') { avA = true; break; }

            // Buscar cada celda con LLENO
            for (var m = 0; m < celdas.length; m++) {
              var celda = celdas[m];
              var txt = readCellText(celda.td).toUpperCase();
              if (txt.indexOf('LLENO') === -1) continue;

              // Tipo: ir hacia atrás en celdas del mismo turno hasta encontrar un tipo válido
              var tipo = '';
              var tipoColor = '';
              for (var p = m - 1; p >= 0; p--) {
                var prevTd = celdas[p].td;
                var prevTxt = readCellText(prevTd).toUpperCase();
                if (esTipoValido(prevTxt)) {
                  tipo = prevTxt;
                  // Capturar el fondo coloreado de esta celda (BASURA=amarillo, CARTÓN=cyan, ENVASES=verde lima…)

                    if (!tipoColor || tipoColor.indexOf('rgba(0, 0, 0, 0)') === 0 || tipoColor === 'transparent') {

                      for (var kk = 0; kk < kids.length; kk++) {
                        var ccs = window.getComputedStyle(kids[kk]);
                        var cbg = ccs.backgroundColor || '';
                        if (cbg && cbg.indexOf('rgba(0, 0, 0, 0)') !== 0 && cbg !== 'transparent') {
                          tipoColor = cbg;
                          break;
                        }
                      }
                    }
                  } catch (eC) { tipoColor = ''; }
                  break;
                }
              }
              if (!tipo) tipo = 'SIN TIPO';

              var bucket = esAverTurno ? datos[turno].aver : datos[turno].disp;
              if (!bucket[tipo]) bucket[tipo] = { count: 0, color: tipoColor };
              bucket[tipo].count += 1;
              // Si una incidencia posterior tuvo color y la primera no, guardarlo
              if (!bucket[tipo].color && tipoColor) bucket[tipo].color = tipoColor;
            }
          });
        }

        // Renderizar un único bloque debajo de la tabla, con 3 columnas
        var containerId = '__cnt_main__';
        var existing = document.getElementById(containerId);

        function bloqueTurno(turno) {
          var d = datos[turno];
          var dispKeys = Object.keys(d.disp).sort();
          var averKeys = Object.keys(d.aver).sort();
          // Convierte rgb(r,g,b) o rgba(r,g,b,a) → rgba(r,g,b, 0.5). Si no hay color, fallback.
          function toAlpha30(c, fallback) {

          function toTextColor(c, fallback) {

            if (!mm) return fallback;

            var g = Math.round(+mm[2] * 0.55);
            var b = Math.round(+mm[3] * 0.55);

          }

          var html = '<div style="flex:1;min-width:140px;padding:8px 10px;">';
          html += '<div style="font-size:11px;font-weight:800;text-align:center;color:#374151;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;border-bottom:2px solid #e5e7eb;padding-bottom:4px;">' + turno + '</div>';
          if (dispKeys.length === 0 && averKeys.length === 0) {

          } else {
            if (dispKeys.length > 0) {
              html += '<div style="font-size:10px;font-weight:700;color:#15803d;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">Disponibles</div>';
              for (var i = 0; i < dispKeys.length; i++) {
                var k = dispKeys[i];
                var info = d.disp[k];
                var bg = toAlpha30(info.color, '#f0fdf4');
                var txtC = toTextColor(info.color, '#166534');
                var numC = toTextColor(info.color, '#16a34a');
                html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;padding:2px 6px;background:' + bg + ';border-radius:6px;">';
                html += '<span style="font-size:16px;font-weight:900;color:' + numC + ';min-width:20px;text-align:right;">' + info.count + '</span>';
                html += '<span style="font-size:10px;color:' + txtC + ';font-weight:600;">' + k + '</span>';
                html += '</div>';

            }

              html += '<div style="margin-top:6px;font-size:10px;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">&#9888; Averiados</div>';
              for (var a = 0; a < averKeys.length; a++) {
                var ka = averKeys[a];
                var infoA = d.aver[ka];
                var bgA = toAlpha30(infoA.color, '#fef2f2');
                var txtA = toTextColor(infoA.color, '#991b1b');
                var numA = toTextColor(infoA.color, '#dc2626');
                html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;padding:2px 6px;background:' + bgA + ';border-radius:6px;border-left:3px solid #dc2626;">';
                html += '<span style="font-size:16px;font-weight:900;color:' + numA + ';min-width:20px;text-align:right;">' + infoA.count + '</span>';
                html += '<span style="font-size:10px;color:' + txtA + ';font-weight:600;">' + ka + '</span>';
                html += '</div>';
              }
            }
          }
          html += '</div>';
          return html;
        }

        var fullHtml = '';
        fullHtml += '<div style="font-size:12px;font-weight:700;text-align:center;color:#374151;text-transform:uppercase;letter-spacing:0.1em;padding:6px 0;background:#f9fafb;border-bottom:1px solid #e5e7eb;border-top-left-radius:10px;border-top-right-radius:10px;">&#9660; Camiones pendientes de descarga</div>';
        fullHtml += '<div style="display:flex;gap:8px;">';
        fullHtml += bloqueTurno('NOCHE');
        fullHtml += bloqueTurno('URBANIZACIONES');
        fullHtml += bloqueTurno('TARDE');
        fullHtml += '</div>';

        try {
          if (existing && existing.dataset.html === fullHtml) {
            if (existing.style.display === 'none') existing.style.display = '';
          } else if (!existing) {
            var div = document.createElement('div');
            div.id = containerId;
            div.style.cssText = 'margin:8px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08);overflow:hidden;';
            div.innerHTML = fullHtml;
            div.dataset.html = fullHtml;
            tabla.parentNode.insertBefore(div, tabla.nextSibling);
          } else {
            existing.innerHTML = fullHtml;
            existing.dataset.html = fullHtml;
            existing.style.display = '';
          }
        } finally {
          // Liberamos el guard que protege también la pintura de overlays sobre las celdas
          setTimeout(function(){ __cntMutating = false; }, 50);
        }
      }

      // Sustituye el tinte azul claro de filas de la tabla por gris claro y suaviza
      // el chip azul medio de "SIN CARGA" bajando su opacidad a la mitad.
      function tintarFilasGris() {
        try {
          var GRAY = '#f3f4f6'; // gray-100
          // Filas <tr>/<td> azul muy claro → gris
          var celdas = document.querySelectorAll('table tr, table td');
          for (var i = 0; i < celdas.length; i++) {
            var n = celdas[i];
            if (n.dataset && n.dataset.cntGray === '1') continue;
            var cs = window.getComputedStyle(n);
            var bg = cs.backgroundColor || '';
            var m = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (!m) continue;

            var esAzulClaro = (b >= 245 && r >= 200 && r <= 245 && g >= 225 && g <= 250 && (b - r) >= 8 && (b - g) >= 0);
            if (esAzulClaro) {
              n.style.backgroundColor = GRAY;
              if (n.dataset) n.dataset.cntGray = '1';
            }
          }
          // Chip "SIN CARGA": SOLO el elemento cuyo texto exacto sea "SIN CARGA".
          // No tocamos otros chips de color para no afectar a CARTÓN, LLENO, BASURA, etc.
          var hijos = document.querySelectorAll('table td div, table td span');
          for (var j = 0; j < hijos.length; j++) {
            var h = hijos[j];
            if (h.dataset && h.dataset.cntChipSoft === '1') continue;

            var hbg = hcs.backgroundColor || '';
            var hm = hbg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (!hm) continue;
            var hr = +hm[1], hg = +hm[2], hb = +hm[3];
            // Solo si el fondo es un azul (B > R y B alto); evita reaplicar si ya está suavizado
            if (hb > hr && hb >= 200) {
              h.style.backgroundColor = 'rgba(' + hr + ',' + hg + ',' + hb + ',0.35)';
              if (h.dataset) h.dataset.cntChipSoft = '1';
            }
          }
        } catch (e) {}
      }

      function unifyTableGroups() {

        // Also strip any inline height/min-height that React/the bundle sets
        // (this is what lets the gap before row 3137 open up).

          if (tables[t].dataset.flatTable !== '1') tables[t].dataset.flatTable = '1';
          // Neutralise any ancestor that forces the table to stretch with
          // flex/height. Walk up further than before and use computed style
          // so we also catch flex containers defined via Tailwind classes.
          var p = tables[t].parentElement;

                if (p.style.height !== 'auto') p.style.height = 'auto';
                if (p.style.minHeight !== '0px') p.style.minHeight = '0';
              }
            } catch (e) {}
            p = p.parentElement;
          }
        }

        for (var r = 0; r < rows.length; r++) {
          var row = rows[r];
          if (row.dataset.uniformRow !== '1') row.dataset.uniformRow = '1';
          // Remove inline height attribute and style if present
          if (row.hasAttribute('height')) row.removeAttribute('height');
          if (row.style.height) row.style.height = '';
          if (row.style.minHeight) row.style.minHeight = '';

          // or rowspan>1) or regular cell, and clamp height accordingly.
          // Recompute EVERY tick — if React lowers the rowspan, we must
          // bring the inline max-height down or the cell stretches to
          // its rotated-text natural height (40-200px in iPhone Safari).
          var tds = row.children;

            var td = tds[k];
            if (td.hasAttribute('height')) td.removeAttribute('height');

            var wm = '';
            try { wm = window.getComputedStyle(td).writingMode || ''; } catch(e) {}

              if (td.style.maxHeight !== clampPx) td.style.maxHeight = clampPx;
              if (td.style.height !== clampPx) td.style.height = clampPx;

              // The ONLY reliable way to stop a rotated-text cell from
              // stretching its row is to make the content height = 0.

              // the cell has nothing to render → height = our advisory 40px.
              // Large-rowspan cells (rowspan >= 3) keep their rotated label.
              if (isRotated && rs <= 2) {

                if (td.style.fontSize   !== '0px') td.style.fontSize   = '0px';
                if (td.style.lineHeight !== '0')   td.style.lineHeight = '0';
                if (td.style.paddingTop    !== '0px') td.style.paddingTop    = '0px';
                if (td.style.paddingBottom !== '0px') td.style.paddingBottom = '0px';

                try { delete td.dataset.smallRs; } catch(e) { td.removeAttribute('data-small-rs'); }
                if (td.style.fontSize   === '0px') td.style.fontSize   = '';
                if (td.style.lineHeight === '0')   td.style.lineHeight = '';
                if (td.style.paddingTop    === '0px') td.style.paddingTop    = '';
                if (td.style.paddingBottom === '0px') td.style.paddingBottom = '';
              }

              // prior tick may have set (especially after a rowspan drop).
              if (td.style.height) td.style.height = '';
              if (td.style.maxHeight) td.style.maxHeight = '';
              if (td.dataset.groupCell === '1') {
                try { delete td.dataset.groupCell; } catch(e) { td.removeAttribute('data-group-cell'); }
              }
            }
          }
        }
        // FINAL SAFETY NET: walk again and clamp anything still oversized.
        // Safari iOS occasionally lets a row stretch despite all the above
        // (the "3137 huge cell" bug). For each row > 50px, hunt the cells
        // that are causing it and brute-force collapse them.
        clampOversizedRows();

      // Last-resort clamp: if a table row still measures > 50px, find the
      // rotated/group cells inside it and force their visual size to zero.
      // This sacrifices the group label for that ONE row (acceptable — the
      // same label is also shown by the rowspan cells in the other turnos
      // OR there's only 1 vehicle in that group anyway, so a label adds
      // nothing). The point is the row stops being huge.
      function clampOversizedRows() {

          var rows = document.querySelectorAll('table tbody tr[data-uniform-row="1"]');

            // with writing-mode vertical (rotated label). Collapse them.
            var cells = row.children;

              // useless visually here — collapse it to 0.

              if (rs > 2) continue;
              if (td.dataset.collapsedRotated !== '1') {

                td.style.fontSize = '0';
                td.style.lineHeight = '0';
                td.style.padding = '0';
                td.style.border = '0';
                td.style.height = '0';
                td.style.maxHeight = '0';
                td.style.minHeight = '0';
                td.style.overflow = 'hidden';
                td.style.width = '0';
                td.style.maxWidth = '0';
                td.style.minWidth = '0';
              }

      // Reset zoom if Safari iPad let pinch-out through despite our blockers.
      // visualViewport.scale < 1 means user zoomed out — re-apply the meta
      // viewport with initial-scale=1 to snap back. Without this, the rotated
      // group-label cell (rowspan) tries to grow to fill the extra apparent
      // height and drags the rows it covers with it.
      function resetZoomIfNeeded() {
        try {
          if (!window.visualViewport) return;
          var s = window.visualViewport.scale;
          if (s && Math.abs(s - 1) > 0.02) {
            var vp = document.querySelector('meta[name=viewport]');
            if (vp) {
              vp.setAttribute('content',
                'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
            }
          }
        } catch (e) {}
      }

      // --- Gestión de scroll vertical para iPad PWA ---
      // Por defecto el iPad es una PWA con viewport fijo y NO debería necesitar
      // scroll. Pero si una sub-pantalla genera contenido más alto que el viewport,
      // queremos que se pueda hacer scroll en lugar de quedar cortado.
      // En el MENÚ PRINCIPAL: nada de scroll (overflow:hidden).
      // En sub-pantalla: permitir scroll vertical si hace falta.
      function __setStyleIfDiff(el, prop, val) {
        if (!el) return;
        if (el.style[prop] !== val) el.style[prop] = val;
      }
      function gestionarScrolliPad() {
        try {
          var menuBtn = findMenuBackButton();
          var enMenuPrincipal = !menuBtn;
          if (enMenuPrincipal) {
            __setStyleIfDiff(document.documentElement, 'overflowY', 'hidden');
            __setStyleIfDiff(document.documentElement, 'overflowX', 'hidden');
            __setStyleIfDiff(document.body, 'overflowY', 'hidden');
            __setStyleIfDiff(document.body, 'overflowX', 'hidden');
            return;
          }
          // Sub-pantalla: permitir scroll vertical en html y body
          __setStyleIfDiff(document.documentElement, 'overflowY', 'auto');
          __setStyleIfDiff(document.documentElement, 'overflowX', 'hidden');
          __setStyleIfDiff(document.body, 'overflowY', 'auto');
          __setStyleIfDiff(document.body, 'overflowX', 'hidden');
          // -webkit-overflow-scrolling: touch para iOS momentum scroll
          __setStyleIfDiff(document.body, 'webkitOverflowScrolling', 'touch');
        } catch (e) {}
      }

      function runInjections() {
        injectRefreshButton();
        injectPartesGlow();
        replaceBgWithSVG();
        autoFitEyeView();
        fixTextoEditMode();
        try { injectEstadoLocks(); } catch(e) {}
        try { injectContadores(); } catch(e) {}
        try { tintarFilasGris(); } catch(e) {}
        try { gestionarScrolliPad(); } catch(e) {}
        try { resetZoomIfNeeded(); } catch(e) {}
        unifyTableGroups();
      }

      var observer = new MutationObserver(function() {
        if (__cntMutating) return;
        runInjections();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
      // Separate observer for rowspan attribute changes — these don't fire
      // the childList observer above, but they're exactly what triggers the
      // 3137 stretch bug (React lowers rowspan without clearing inline maxH).
      var attrObserver = new MutationObserver(function() {
        if (__cntMutating) return;
        try { unifyTableGroups(); } catch (e) {}
      });
      attrObserver.observe(document.documentElement, {
        attributes: true,
        subtree: true,
        attributeFilter: ['rowspan']
      });
      document.addEventListener('DOMContentLoaded', function () {
        runInjections();
        tryRestoreNavigation();
      });
      // If load already happened
      if (document.readyState !== 'loading') tryRestoreNavigation();
      setInterval(runInjections, 700);

      // BLOCK pinch-zoom on iPad Safari (iOS 26 still allows it despite user-scalable=no)
      // Multi-touch touchmove blocking — must use capture phase to beat any inner listeners
      window.addEventListener('touchmove', function(e) {
        if (e.touches && e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false, capture: true });
      // Legacy Safari gesture events (still fire on iPad in some contexts)
      window.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false, capture: true });
      window.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false, capture: true });

      // Fallback: if zoom still happens somehow, reset on viewport resize
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          __lastFitScreen = '';
          __lastFitHeight = 0;
          try { resetZoomIfNeeded(); } catch(e) {}
          try { unifyTableGroups(); } catch(e) {}
          autoFitEyeView();
        });
        // Some Safari versions emit 'scroll' (not 'resize') on pinch-zoom.
        window.visualViewport.addEventListener('scroll', function() {
          try { resetZoomIfNeeded(); } catch(e) {}
        });
      }
    })();

    // PWA service worker registration (offline support)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js').catch(function (err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
